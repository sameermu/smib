<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img"
     style="font-family:system-ui,-apple-system,sans-serif">
  <title>Synchronous machine reactance regimes over time</title>
  <desc>Shows that the apparent reactance of a synchronous machine
        increases over time after a disturbance, going from X"_d
        (subtransient, smallest) through X'_d (transient) to X_d
        (synchronous, largest), as different rotor windings let go of
        their flux at their respective L/R time constants.</desc>

  <rect width="1000" height="540" fill="#FAFAFA"/>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A1A">
    The three reactance regimes of a synchronous machine
  </text>
  <text x="500" y="52" text-anchor="middle" font-size="13" fill="#555">
    Same machine, three different "apparent reactances" depending on the timescale you look at
  </text>

  <!-- Time axis -->
  <line x1="80" y1="490" x2="920" y2="490" stroke="#333" stroke-width="2" marker-end="url(#tarr)"/>
  <defs>
    <marker id="tarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <text x="930" y="495" font-size="13" font-weight="700">time</text>

  <!-- Time-axis annotations -->
  <line x1="200" y1="485" x2="200" y2="495" stroke="#333" stroke-width="1.5"/>
  <text x="200" y="513" text-anchor="middle" font-size="11" fill="#333">~0.05 s</text>
  <line x1="500" y1="485" x2="500" y2="495" stroke="#333" stroke-width="1.5"/>
  <text x="500" y="513" text-anchor="middle" font-size="11" fill="#333">~0.5 s</text>
  <line x1="800" y1="485" x2="800" y2="495" stroke="#333" stroke-width="1.5"/>
  <text x="800" y="513" text-anchor="middle" font-size="11" fill="#333">~5 s and beyond</text>

  <!-- ===== REGIME 1: SUBTRANSIENT (left) ===== -->
  <g transform="translate(40, 80)">
    <rect width="280" height="380" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
    <text x="140" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#BF360C">
      Subtransient
    </text>
    <text x="140" y="46" text-anchor="middle" font-size="11" fill="#666">
      first ~50 ms after disturbance
    </text>

    <!-- Mini circuit: E"  X"_d  V_term -->
    <circle cx="60" cy="120" r="22" fill="white" stroke="#222" stroke-width="2"/>
    <text x="60" y="118" text-anchor="middle" font-size="13" font-weight="700">~</text>
    <text x="60" y="132" text-anchor="middle" font-size="11">E″</text>
    <line x1="82" y1="120" x2="120" y2="120" stroke="#222" stroke-width="2"/>
    <!-- inductor zigzag -->
    <path d="M 120 120 L 130 110 L 140 130 L 150 110 L 160 130 L 170 110 L 180 130 L 190 120"
          stroke="#222" stroke-width="2" fill="none"/>
    <text x="155" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#BF360C">X″_d</text>
    <text x="155" y="148" text-anchor="middle" font-size="11" fill="#666">≈ 0.23 pu</text>
    <line x1="190" y1="120" x2="220" y2="120" stroke="#222" stroke-width="2"/>
    <circle cx="225" cy="120" r="4" fill="#222"/>
    <text x="240" y="124" font-size="11" fill="#222">V</text>

    <!-- physical explanation -->
    <text x="20" y="190" font-size="11" fill="#222" font-weight="700">What's happening:</text>
    <text x="20" y="210" font-size="11" fill="#333">Both rotor windings (field +</text>
    <text x="20" y="225" font-size="11" fill="#333">damper) hold their flux constant.</text>
    <text x="20" y="240" font-size="11" fill="#333">All flux is "locked in" — the</text>
    <text x="20" y="255" font-size="11" fill="#333">stator sees the smallest reactance</text>
    <text x="20" y="270" font-size="11" fill="#333">it ever sees from this machine.</text>

    <text x="20" y="300" font-size="11" fill="#222" font-weight="700">Why X″_d is smallest:</text>
    <text x="20" y="320" font-size="11" fill="#333">Two parallel "shorted" inductors</text>
    <text x="20" y="335" font-size="11" fill="#333">(field + damper) shunt the mutual</text>
    <text x="20" y="350" font-size="11" fill="#333">reactance, leaving only the</text>
    <text x="20" y="365" font-size="11" fill="#333">leakage paths to flux growth.</text>
  </g>

  <!-- ===== REGIME 2: TRANSIENT (middle) ===== -->
  <g transform="translate(360, 80)">
    <rect width="280" height="380" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <text x="140" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">
      Transient
    </text>
    <text x="140" y="46" text-anchor="middle" font-size="11" fill="#666">
      ~0.05 s to ~5 s after disturbance
    </text>

    <!-- Mini circuit: E'  X'_d  V_term -->
    <circle cx="60" cy="120" r="22" fill="white" stroke="#222" stroke-width="2"/>
    <text x="60" y="118" text-anchor="middle" font-size="13" font-weight="700">~</text>
    <text x="60" y="132" text-anchor="middle" font-size="11">E′</text>
    <line x1="82" y1="120" x2="120" y2="120" stroke="#222" stroke-width="2"/>
    <path d="M 120 120 L 130 110 L 140 130 L 150 110 L 160 130 L 170 110 L 180 130 L 190 120"
          stroke="#222" stroke-width="2" fill="none"/>
    <text x="155" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#0D47A1">X′_d</text>
    <text x="155" y="148" text-anchor="middle" font-size="11" fill="#666">≈ 0.30 pu</text>
    <line x1="190" y1="120" x2="220" y2="120" stroke="#222" stroke-width="2"/>
    <circle cx="225" cy="120" r="4" fill="#222"/>
    <text x="240" y="124" font-size="11" fill="#222">V</text>

    <text x="20" y="190" font-size="11" fill="#222" font-weight="700">What's happening:</text>
    <text x="20" y="210" font-size="11" fill="#333">Damper currents have decayed</text>
    <text x="20" y="225" font-size="11" fill="#333">(L/R = T″_d0 ≈ 0.03 s).  Only the</text>
    <text x="20" y="240" font-size="11" fill="#333">field winding still holds its flux.</text>
    <text x="20" y="255" font-size="11" fill="#333">Reactance has grown from X″_d to X′_d.</text>

    <text x="20" y="290" font-size="11" fill="#222" font-weight="700">This is the regime that</text>
    <text x="20" y="305" font-size="11" fill="#222" font-weight="700">GENCLS approximates:</text>
    <text x="20" y="325" font-size="11" fill="#333">GENCLS holds E′ constant forever</text>
    <text x="20" y="340" font-size="11" fill="#333">(T′_d0 → ∞), valid only on</text>
    <text x="20" y="355" font-size="11" fill="#333">timescales much shorter than the</text>
    <text x="20" y="370" font-size="11" fill="#333">field winding's L/R ≈ 8 s.</text>
  </g>

  <!-- ===== REGIME 3: SYNCHRONOUS (right) ===== -->
  <g transform="translate(680, 80)">
    <rect width="280" height="380" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
    <text x="140" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1B5E20">
      Synchronous (steady-state)
    </text>
    <text x="140" y="46" text-anchor="middle" font-size="11" fill="#666">
      ~5 s and beyond
    </text>

    <!-- Mini circuit: E_q  X_d  V_term -->
    <circle cx="60" cy="120" r="22" fill="white" stroke="#222" stroke-width="2"/>
    <text x="60" y="118" text-anchor="middle" font-size="13" font-weight="700">~</text>
    <text x="60" y="132" text-anchor="middle" font-size="11">E_q</text>
    <line x1="82" y1="120" x2="120" y2="120" stroke="#222" stroke-width="2"/>
    <path d="M 120 120 L 130 110 L 140 130 L 150 110 L 160 130 L 170 110 L 180 130 L 190 120"
          stroke="#222" stroke-width="2" fill="none"/>
    <text x="155" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">X_d</text>
    <text x="155" y="148" text-anchor="middle" font-size="11" fill="#666">≈ 1.81 pu</text>
    <line x1="190" y1="120" x2="220" y2="120" stroke="#222" stroke-width="2"/>
    <circle cx="225" cy="120" r="4" fill="#222"/>
    <text x="240" y="124" font-size="11" fill="#222">V</text>

    <text x="20" y="190" font-size="11" fill="#222" font-weight="700">What's happening:</text>
    <text x="20" y="210" font-size="11" fill="#333">Field flux has fully relaxed to</text>
    <text x="20" y="225" font-size="11" fill="#333">whatever the AVR holds it at.</text>
    <text x="20" y="240" font-size="11" fill="#333">No rotor current "shorts" the</text>
    <text x="20" y="255" font-size="11" fill="#333">mutual reactance. Stator sees</text>
    <text x="20" y="270" font-size="11" fill="#333">the full synchronous reactance.</text>

    <text x="20" y="300" font-size="11" fill="#222" font-weight="700">The big number:</text>
    <text x="20" y="320" font-size="11" fill="#333">X_d ≈ 1.8 pu means the machine is</text>
    <text x="20" y="335" font-size="11" fill="#333">quite "soft" in steady state — but</text>
    <text x="20" y="350" font-size="11" fill="#333">that's after seconds of dynamics</text>
    <text x="20" y="365" font-size="11" fill="#333">that we mostly care about anyway.</text>
  </g>

  <!-- Bottom strip with a key insight -->
  <text x="500" y="468" text-anchor="middle" font-size="13" fill="#333" font-style="italic">
    Hierarchy: X″_d (smallest, stiffest)  &lt;  X′_d  &lt;  X_d (largest)  ·  smaller reactance ⇒ higher fault current contribution
  </text>
</svg>
