<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" role="img"
     style="font-family:system-ui,-apple-system,sans-serif">
  <title>Network DQ and machine dq reference frames</title>
  <desc>Geometry of the rotation between the stationary synchronous
        network DQ frame and the rotating machine dq frame at rotor
        angle delta.</desc>

  <rect width="920" height="600" fill="#FAFAFA"/>

  <text x="460" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A1A">
    Two reference frames in an RMS/phasor simulator
  </text>
  <text x="460" y="52" text-anchor="middle" font-size="13" fill="#555">
    Stationary network DQ (we solve V = Y·I here) vs rotating machine dq (each generator's flux equations live here)
  </text>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arq" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565C0"/>
    </marker>
    <marker id="ard" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#E65100"/>
    </marker>
    <marker id="arv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Origin at (350, 350), axes ~250 px long -->
  <g transform="translate(350, 350)">
    <!-- Network frame axes (stationary, light) -->
    <line x1="0" y1="0" x2="250" y2="0" stroke="#888" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
    <line x1="0" y1="0" x2="0" y2="-250" stroke="#888" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ar)"/>
    <text x="262" y="6" font-size="14" font-weight="700" fill="#666">Q (network real)</text>
    <text x="-46" y="-256" font-size="14" font-weight="700" fill="#666">D</text>
    <text x="-66" y="-242" font-size="11" fill="#666">(network imag)</text>

    <!-- Origin -->
    <circle cx="0" cy="0" r="3" fill="#222"/>

    <!-- Machine frame axes (rotated by delta = 35 deg, solid coloured) -->
    <!-- exp(j·35°): cos = 0.819, sin = 0.574 -->
    <!-- q-axis on positive real of rotated frame: from origin in direction (cos(δ), -sin(δ)) in screen coords (because Y flipped) -->
    <line x1="0" y1="0" x2="205" y2="-143" stroke="#1565C0" stroke-width="3" marker-end="url(#arq)"/>
    <line x1="0" y1="0" x2="-143" y2="-205" stroke="#E65100" stroke-width="3" marker-end="url(#ard)"/>
    <text x="215" y="-145" font-size="14" font-weight="700" fill="#1565C0">q</text>
    <text x="218" y="-130" font-size="11" fill="#1565C0">(machine real, aligned with E')</text>
    <text x="-160" y="-220" font-size="14" font-weight="700" fill="#E65100">d</text>
    <text x="-235" y="-205" font-size="11" fill="#E65100">(machine imag, perpendicular)</text>

    <!-- Delta arc -->
    <path d="M 60 0 A 60 60 0 0 0 49 -34" fill="none" stroke="#222" stroke-width="1.5"/>
    <text x="68" y="-12" font-size="14" font-weight="700" fill="#222">δ</text>

    <!-- Sample phasor V (from origin), drawn in green -->
    <line x1="0" y1="0" x2="180" y2="-90" stroke="#2E7D32" stroke-width="3" marker-end="url(#arv)"/>
    <text x="190" y="-92" font-size="14" font-weight="700" fill="#2E7D32">V</text>

    <!-- V projections onto network DQ (light dashed) -->
    <line x1="180" y1="-90" x2="180" y2="0" stroke="#888" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="180" y1="-90" x2="0" y2="-90" stroke="#888" stroke-width="1" stroke-dasharray="2 2"/>
    <text x="184" y="-44" font-size="11" fill="#666">V_D</text>
    <text x="60" y="-78" font-size="11" fill="#666">V_Q</text>

    <!-- V projections onto machine dq (coloured dashed) -->
    <!-- Need to project (180, -90) onto unit q (0.819, -0.574) and unit d (-0.574, -0.819).
         V_q = 180*0.819 + (-90)*(-0.574) = 147.4 + 51.6 = 199.0
         V_d = 180*(-0.574) + (-90)*(-0.819) = -103.3 + 73.7 = -29.6  -- small d component
         For drawing: v_q point = V_q * (0.819, -0.574) = (163, -114)
                      v_d point = V_d * (-0.574, -0.819) = (17, 24)  (negative d means opposite direction) -->
    <line x1="180" y1="-90" x2="163" y2="-114" stroke="#1565C0" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="180" y1="-90" x2="17" y2="24"   stroke="#E65100" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="115" y="-118" font-size="11" font-weight="700" fill="#1565C0">V_q</text>
    <text x="105" y="40"   font-size="11" font-weight="700" fill="#E65100">V_d</text>

    <!-- Frame label -->
    <text x="0" y="40" font-size="11" font-style="italic" fill="#444">origin = system synchronous reference</text>
  </g>

  <!-- =========== MATH PANEL ON THE RIGHT =========== -->
  <g transform="translate(580, 100)">
    <rect width="320" height="430" rx="6" fill="white" stroke="#888"/>
    <text x="15" y="22" font-size="13" font-weight="700" fill="#222">The rotation operator</text>
    <text x="15" y="44" font-size="12" fill="#222" font-family="ui-monospace,monospace">
      X_machine_complex = X_global · exp(-j·δ)
    </text>

    <text x="15" y="78" font-size="13" font-weight="700" fill="#222">Decomposition (Kundur convention)</text>
    <text x="15" y="100" font-size="12" fill="#222" font-family="ui-monospace,monospace">
      let z = X_global · exp(-j·δ)
    </text>
    <text x="15" y="120" font-size="12" fill="#222" font-family="ui-monospace,monospace">
      X_q  = Re(z)
    </text>
    <text x="15" y="140" font-size="12" fill="#222" font-family="ui-monospace,monospace">
      X_d  = -Im(z)
    </text>

    <text x="15" y="174" font-size="13" font-weight="700" fill="#222">Inverse rotation</text>
    <text x="15" y="196" font-size="12" fill="#222" font-family="ui-monospace,monospace">
      X_global = (X_q - j·X_d) · exp(j·δ)
    </text>

    <text x="15" y="230" font-size="13" font-weight="700" fill="#222">PowerWorld convention</text>
    <text x="15" y="252" font-size="12" fill="#222" font-family="ui-monospace,monospace">
      X_global = (X_d + j·X_q) · exp(j·(δ-π/2))
    </text>
    <text x="15" y="272" font-size="11" fill="#666" font-style="italic">
      (algebraically identical — d/q labels swap)
    </text>

    <text x="15" y="306" font-size="13" font-weight="700" fill="#222">Why two frames?</text>
    <text x="15" y="328" font-size="11" fill="#222">• Network solve V = Y·I is naturally in</text>
    <text x="15" y="344" font-size="11" fill="#222">  the system synchronous frame (DQ).</text>
    <text x="15" y="364" font-size="11" fill="#222">• Each machine's flux equations are</text>
    <text x="15" y="380" font-size="11" fill="#222">  written in its rotor's rotating frame</text>
    <text x="15" y="396" font-size="11" fill="#222">  (dq), where E_q lies on the q-axis.</text>
    <text x="15" y="416" font-size="11" fill="#222">  The rotation reconciles the two each step.</text>
  </g>
</svg>
