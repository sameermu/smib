<svg viewBox="0 0 880 1180" xmlns="http://www.w3.org/2000/svg" role="img"
     style="max-width:100%;height:auto;font-family:system-ui,-apple-system,sans-serif">
  <title>Trapezoidal integration flow per timestep</title>
  <desc>Flowchart showing how each integration step computes derivatives
        via the swing equation and adds them to the state vector via
        the trapezoidal rule.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="880" height="1180" fill="#FAFAFA"/>
  <text x="440" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A1A">
    Trapezoidal Integration — One Timestep (h = 2 ms)
  </text>
  <text x="440" y="52" text-anchor="middle" font-size="12" fill="#666">
    swing equation evaluated → averaged → added to state
  </text>

  <g transform="translate(580, 70)">
    <rect width="280" height="92" rx="4" fill="white" stroke="#CCC"/>
    <text x="10" y="18" font-size="11" font-weight="700" fill="#222">Box colour = what happens</text>
    <rect x="10" y="28" width="14" height="14" rx="2" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
    <text x="32" y="40" font-size="11" fill="#222">compute dx/dt    (the swing equation)</text>
    <rect x="10" y="48" width="14" height="14" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="32" y="60" font-size="11" fill="#222">update state x   (the trapezoidal rule)</text>
    <rect x="10" y="68" width="14" height="14" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
    <text x="32" y="80" font-size="11" fill="#222">solve network for V (algebraic)</text>
  </g>

  <g><rect x="80" y="180" width="250" height="46" rx="6" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5"/>
     <text x="205" y="200" text-anchor="middle" font-size="13" font-weight="700">State at t_k</text>
     <text x="205" y="218" text-anchor="middle" font-size="11" fill="#444">x₀ = (δ, ω̄)</text></g>
  <line x1="205" y1="226" x2="205" y2="252" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><rect x="80" y="252" width="250" height="46" rx="6" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5"/>
     <text x="205" y="272" text-anchor="middle" font-size="13" font-weight="700">Apply scenario events</text>
     <text x="205" y="290" text-anchor="middle" font-size="11" fill="#444">faults, V steps, ...</text></g>
  <line x1="205" y1="298" x2="205" y2="324" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><rect x="80" y="324" width="250" height="46" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
     <text x="205" y="344" text-anchor="middle" font-size="13" font-weight="700">V₀ = solve_net(x₀)</text>
     <text x="205" y="362" text-anchor="middle" font-size="11" fill="#444">augmented Ybus algebra</text></g>
  <line x1="205" y1="370" x2="205" y2="396" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><rect x="80" y="396" width="250" height="60" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="2"/>
     <text x="205" y="418" text-anchor="middle" font-size="13" font-weight="700">f₀ = derivatives(x₀, V₀)</text>
     <text x="205" y="436" text-anchor="middle" font-size="11" fill="#444">slope at start of step</text>
     <text x="205" y="450" text-anchor="middle" font-size="10" fill="#555">first call to gencls.derivatives()</text></g>
  <line x1="205" y1="456" x2="205" y2="482" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><rect x="80" y="482" width="250" height="60" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
     <text x="205" y="504" text-anchor="middle" font-size="13" font-weight="700">PREDICTOR (Euler guess)</text>
     <text x="205" y="522" text-anchor="middle" font-size="13" font-family="ui-monospace,monospace" fill="#1B5E20">x = x₀ + h·f₀</text>
     <text x="205" y="538" text-anchor="middle" font-size="10" fill="#555">first guess at end-of-step state</text></g>
  <line x1="205" y1="542" x2="205" y2="572" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><circle cx="205" cy="586" r="14" fill="#FFF" stroke="#C62828" stroke-width="2"/>
     <text x="205" y="591" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828">↻</text></g>
  <line x1="205" y1="600" x2="205" y2="624" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><rect x="80" y="624" width="250" height="46" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
     <text x="205" y="644" text-anchor="middle" font-size="13" font-weight="700">V = solve_net(x)</text>
     <text x="205" y="662" text-anchor="middle" font-size="11" fill="#444">re-solve at current guess</text></g>
  <line x1="205" y1="670" x2="205" y2="696" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><rect x="80" y="696" width="250" height="60" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="2"/>
     <text x="205" y="718" text-anchor="middle" font-size="13" font-weight="700">f = derivatives(x, V)</text>
     <text x="205" y="736" text-anchor="middle" font-size="11" fill="#444">slope at end of step</text>
     <text x="205" y="750" text-anchor="middle" font-size="10" fill="#555">re-calls gencls.derivatives() each iter</text></g>
  <line x1="205" y1="756" x2="205" y2="782" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><rect x="80" y="782" width="250" height="76" rx="6" fill="#A5D6A7" stroke="#1B5E20" stroke-width="3"/>
     <text x="205" y="804" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">TRAPEZOIDAL UPDATE</text>
     <text x="205" y="824" text-anchor="middle" font-size="14" font-family="ui-monospace,monospace" fill="#0F3D14" font-weight="700">x_new = x₀ + (h/2)·(f₀ + f)</text>
     <text x="205" y="842" text-anchor="middle" font-size="11" fill="#1B5E20">average of start &amp; end slopes</text>
     <text x="205" y="854" text-anchor="middle" font-size="10" fill="#555">this is THE numerical backbone</text></g>
  <line x1="205" y1="858" x2="205" y2="884" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g><polygon points="205,884 305,924 205,964 105,924" fill="#FFF9C4" stroke="#F57F17" stroke-width="2"/>
     <text x="205" y="918" text-anchor="middle" font-size="12" font-weight="700">|x_new − x| &lt; tol?</text>
     <text x="205" y="934" text-anchor="middle" font-size="10" fill="#555">tol = 1e−8</text></g>

  <line x1="205" y1="964" x2="205" y2="990" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="220" y="980" font-size="11" font-weight="700" fill="#2E7D32">yes</text>

  <text x="318" y="918" font-size="11" font-weight="700" fill="#C62828">no</text>
  <path d="M 305 924 L 380 924 L 380 586 L 220 586"
        fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrR)"/>
  <text x="386" y="752" font-size="10" fill="#C62828" transform="rotate(-90 386 752)" text-anchor="middle">x ← x_new, iterate</text>

  <g><rect x="80" y="990" width="250" height="60" rx="6" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5"/>
     <text x="205" y="1010" text-anchor="middle" font-size="13" font-weight="700">Sync state, log outputs</text>
     <text x="205" y="1026" text-anchor="middle" font-size="11" fill="#444">P, Q, |V|, I_d, I_q, δ, ω̄</text>
     <text x="205" y="1040" text-anchor="middle" font-size="10" fill="#555">trace arrays for the canonical 5</text></g>
  <line x1="205" y1="1050" x2="205" y2="1075" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="205" y="1100" text-anchor="middle" font-size="12" font-style="italic" fill="#444">
    t ← t + h, repeat for next step
  </text>

  <g transform="translate(420, 396)">
    <rect width="430" height="60" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="700" fill="#BF360C">Inside derivatives() — the swing equation:</text>
    <text x="10" y="36" font-size="12" font-family="ui-monospace,monospace" fill="#222">  dδ/dt   = ω₀ · ω̄</text>
    <text x="10" y="52" font-size="12" font-family="ui-monospace,monospace" fill="#222">  dω̄/dt = (Pₘ − Pₑ(δ, V) − D·ω̄) / (2H)</text>
  </g>
  <g transform="translate(420, 482)">
    <rect width="430" height="60" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="700" fill="#1B5E20">Predictor (Euler):</text>
    <text x="10" y="36" font-size="11" fill="#222">First guess at x_new using only the start slope.</text>
    <text x="10" y="52" font-size="11" fill="#222">Too coarse alone (1st order). Just seeds the corrector.</text>
  </g>
  <g transform="translate(420, 696)">
    <rect width="430" height="60" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="700" fill="#BF360C">Re-evaluate the same swing equation:</text>
    <text x="10" y="36" font-size="11" fill="#222">f = (ω₀·ω̄_new,  (Pₘ − Pₑ(δ_new, V) − D·ω̄_new) / (2H))</text>
    <text x="10" y="52" font-size="11" fill="#222">at the corrector's current guess for x_new.</text>
  </g>
  <g transform="translate(420, 782)">
    <rect width="430" height="76" rx="4" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1.5"/>
    <text x="10" y="18" font-size="11" font-weight="700" fill="#0F3D14">THIS is where derivatives become state changes.</text>
    <text x="10" y="36" font-size="12" font-family="ui-monospace,monospace" fill="#0F3D14">  δ_new   = δ₀   + (h/2)·(dδ/dt|₀  + dδ/dt|_new)</text>
    <text x="10" y="52" font-size="12" font-family="ui-monospace,monospace" fill="#0F3D14">  ω̄_new = ω̄₀ + (h/2)·(dω̄/dt|₀ + dω̄/dt|_new)</text>
    <text x="10" y="70" font-size="11" fill="#1B5E20">2nd-order accurate, A-stable. PSSE uses the same scheme.</text>
  </g>
  <g transform="translate(420, 884)">
    <rect width="430" height="80" rx="4" fill="#FFFDE7" stroke="#F57F17" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="700" fill="#E65100">Fixed-point corrector loop:</text>
    <text x="10" y="36" font-size="11" fill="#222">f depends on x_new (implicit), so we iterate. Re-solve</text>
    <text x="10" y="52" font-size="11" fill="#222">network → re-compute f → re-apply trapezoidal update.</text>
    <text x="10" y="70" font-size="11" fill="#222">Typically converges in 2–3 iterations for GENCLS.</text>
  </g>
</svg>
